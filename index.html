<!doctype html>
<html lang="zh-cn">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Le départ</title>
    <link rel="icon" href="../favicon.png">
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      html, body { height: 100%; }

      body {
        margin: 0;
        font-family: -apple-system,BlinkMacSystemFont,PingFang SC,Hiragino Sans GB,Microsoft YaHei,"\5FAE\8F6F\96C5\9ED1",helvetica neue,helvetica,ubuntu,roboto,noto,segoe ui,Arial,sans-serif;
        color: #474a4d;
        background-color: #FDFCFC;
        background-image: url('https://open.saintic.com/api/bingPic/');
        background-size: cover;
        background-repeat: no-repeat;
        background-attachment: fixed;
        background-position: center;
      }

      a { color: inherit; text-decoration: none; }

      .content {
        opacity: 0;
        transition: opacity 0.3s ease;
        max-width: 1200px;
        margin: 0 auto;
        padding: 18px 12px 36px;
      }
      .content.ready { opacity: 1; }

      /* Header */
      .navbar {
        display: flex;
        align-items: center;
        margin-bottom: 12px;
        padding: 10px 6px 5px 0;
      }
      .header-title {
        color: #fff;
        font-size: 26px;
        line-height: 26px;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.25);
      }

      /* Layout */
      .blocks {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 26px;
      }
      @media (max-width: 960px) {
        .blocks { grid-template-columns: repeat(2, 1fr); }
      }
      @media (max-width: 640px) {
        .blocks { grid-template-columns: 1fr; }
      }

      .block {
        padding: 3px;
        opacity: 0.95;
      }

      .building {
        border-radius: 2px;
      }

      .block-header {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        padding-bottom: 2px;
      }

      .block-name {
        display: block;
        padding-top: 1px;
        text-align: left;
        color: #fff;
        font-size: 14px;
        line-height: 32px;
        height: 32px;
        border-radius: 2px;
      }

      /* Website tiles */
      .websites {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2px;
      }

      .website {
        padding: 1px;
      }

      .website-link {
        display: block;
        background-color: rgb(255 255 255 / 60%);
        text-align: center;
        line-height: 45px;
        height: 45px;
        font-size: 14px;
        border-radius: 2px;
        color: #333;
        transition: background-color 0.2s ease,
                    color 0.2s ease,
                    font-size 0.2s ease;
      }

      .website-link span {
        display: block;
        height: 100%;
        width: 100%;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        padding: 0 6px;
      }

      .website-link:hover {
        background-color: #2c3e50;
        color: #fff;
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <div class="content">
      <nav class="navbar">

      </nav>
      <div class="blocks" id="blocks"></div>

      // 头部显示日期
      function renderDate() {
        const d = new Date();
        const weekday = "日一二三四五六".charAt(d.getDay());
        document.getElementById("header-date").textContent =
          `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日 星期${weekday}`;
      }

      // 渲染所有分类与站点
      function renderBlocks() {
        const container = document.getElementById("blocks");
        const frag = document.createDocumentFragment();

        NAV_DATA.categories.forEach((cat) => {
          const block = document.createElement("div");
          block.className = "block";

          const building = document.createElement("div");
          building.className = "building";

          const header = document.createElement("div");
          header.className = "block-header";

          const name = document.createElement("div");
          name.className = "block-name";
          name.textContent = cat.name;
          header.appendChild(name);

          const websites = document.createElement("div");
          websites.className = "websites";

          cat.sites.forEach((site) => {
            const cell = document.createElement("div");
            cell.className = "website";

            const link = document.createElement("a");
            link.className = "website-link";
            link.href = site.url;
            link.target = "_blank";
            link.rel = "noopener noreferrer";

            const span = document.createElement("span");
            span.textContent = site.name;
            link.appendChild(span);

            cell.appendChild(link);
            websites.appendChild(cell);
          });

          building.appendChild(header);
          building.appendChild(websites);
          block.appendChild(building);
          frag.appendChild(block);
        });

        container.appendChild(frag);
        document.querySelector(".content").classList.add("ready");
      }

      document.addEventListener("DOMContentLoaded", () => {
        renderDate();
        renderBlocks();
      });
    </script>
  </body>
</html>
